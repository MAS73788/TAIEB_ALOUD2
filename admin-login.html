<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول · لوحة تحكم طيب العود</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Cairo',sans-serif;
      background:#0D0C0C;
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      direction:rtl;
      padding:20px;
    }
    .wrap { width:100%; max-width:380px; }
    .brand { text-align:center; margin-bottom:24px; }
    .brand h1 {
      font-family:'Amiri',serif;
      font-size:30px;
      color:#C9A84C;
      letter-spacing:0.5px;
    }
    .brand p { color:rgba(255,255,255,0.5); font-size:13px; margin-top:4px; }
    .card {
      background:linear-gradient(145deg, #1a1a1a 0%, #0D0C0C 100%);
      border:1px solid rgba(201,168,76,0.2);
      border-radius:18px;
      padding:28px;
      box-shadow:0 20px 60px rgba(0,0,0,0.4);
    }
    label { display:block; font-size:13px; margin-bottom:6px; color:rgba(255,255,255,0.7); }
    input {
      width:100%;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:12px;
      padding:11px 14px;
      font-size:14px;
      color:#fff;
      margin-bottom:16px;
      font-family:inherit;
      outline:none;
      transition:border-color 0.2s;
    }
    input:focus { border-color:#C9A84C; }
    button {
      width:100%;
      background:#C9A84C;
      color:#0D0C0C;
      border:none;
      border-radius:12px;
      padding:12px;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      font-family:inherit;
      transition:all 0.15s;
    }
    button:hover { background:#dbbb5e; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
    .error { color:#ff6b6b; font-size:13px; margin-bottom:12px; display:none; }
    .back {
      display:block;
      text-align:center;
      margin-top:18px;
      font-size:12px;
      color:rgba(255,255,255,0.4);
      text-decoration:none;
    }
    .back:hover { color:#C9A84C; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <h1>طيب العود</h1>
      <p>لوحة تحكم الإدارة</p>
    </div>

    <div class="card">
      <form id="loginForm">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" required autocomplete="username" placeholder="" />

        <label for="password">كلمة المرور</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="" />

        <p class="error" id="errorMsg"></p>

        <button type="submit" id="loginBtn">تسجيل الدخول</button>
      </form>
    </div>

    <a href="index.html" class="back">← العودة إلى الموقع</a>
  </div>

  <script type="module">
    import { auth } from './firebase-config.js';
    import {
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'admin.html';
    });

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
    }
    function hideError() {
      errorMsg.style.display = 'none';
    }

    function translateError(code) {
      switch (code) {
        case 'auth/invalid-email': return 'البريد الإلكتروني غير صحيح';
        case 'auth/user-not-found':
        case 'auth/invalid-credential': return 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
        case 'auth/wrong-password': return 'كلمة المرور غير صحيحة';
        case 'auth/too-many-requests': return 'محاولات كثيرة جدًا، حاول مرة أخرى بعد قليل';
        case 'auth/network-request-failed': return 'تعذر الاتصال بالإنترنت';
        default: return 'حدث خطأ أثناء تسجيل الدخول';
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      loginBtn.disabled = true;
      loginBtn.textContent = 'جارٍ الدخول...';
      try {
        await signInWithEmailAndPassword(auth, emailInput.value.trim(), passwordInput.value);
        window.location.href = 'admin.html';
      } catch (err) {
        showError(translateError(err.code));
        loginBtn.disabled = false;
        loginBtn.textContent = 'تسجيل الدخول';
      }
    });
  </script>
</body>
</html>
